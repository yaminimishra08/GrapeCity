<!-- Declares the document type and HTML5 version -->
<!DOCTYPE html>
<!-- Root element of the webpage-->
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width , initial-scale=1.0">
        <!-- Title displayed in browser tab -->
        <title>Task 4:Countdown Timer </title>
        <!-- Links external CSS file for styling -->
        <link rel="stylesheet" href="timer.css">
    </head>
    
<!-- ===========================
   Main content of the webpage 
============================== -->
    <body>
        <!-- Header Section -->
        <header>
        <h2>Countdown Timer</h2>
        </header>
        <!-- This shows the time on the page -->
        <h1 id="timer">60:00</h1>

        <!-- Buttons to control the timer -->
        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>

        <!-- Linking the Javascript file -->
        <script src="timer.js">
        </script>
    
    </body>
</html>
