<!-- Declares the document type and HTML5 version -->
<!DOCTYPE html>
<html>
    <head>
        <!-- Title displayed in browser tab -->
        <title>Task 2: Unique Elements from Two Arrays</title>
    </head>
    
<!-- ===========================
   Main content of the webpage
=========================== -->
    <body>
        <!-- Heading for the page -->
        <h2>Find Unique Elements from Two Arrays</h2>
        
<!-- JavaScript Code -->
        <script>
        // Function to return unique elements from two arrays
        function getUnique(arr1, arr2)
        {
            // Combine both arrays
            const combined = arr1.concat(arr2);
            // Filter only unique values
            const unique = combined.filter((value, index) =>
            {
                return combined.indexOf(value) === index;
            }
        );
        
        return unique;
        }
        
        // Example arrays
        const array1 = [1, 2, 3, 4];
        const array2 = [3, 4, 5, 6];
        
        // Store result
        const result = getUnique(array1, array2);
        
        // Display result on webpage
        document.write("Unique Elements: " + result);
        
        </script>
        
    </body>
</html>
